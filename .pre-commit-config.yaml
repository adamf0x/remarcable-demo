repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.12
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: https://github.com/astral-sh/uv-pre-commit
  # uv version.
  rev: 0.11.8
  hooks:
    - id: uv-lock
- repo: local
  hooks:
  - id: pytest
    name: pytest
    entry: ./.venv/bin/pytest ./remarcable/remarcabledemo/tests.py
    language: system
    types: [python]
    pass_filenames: false
    always_run: true